<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    header {
      padding: 16px 24px;
      background: #111827;
      color: white;
    }

    header h1 {
      margin: 0;
      font-size: 20px;
    }

    header p {
      margin: 4px 0 0;
      font-size: 14px;
      color: #d1d5db;
    }

    main {
      height: calc(100vh - 72px);
      padding: 12px;
      box-sizing: border-box;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: 10px;
      background: white;
    }
  </style>
</head>

<body>
  <header>
    <h1>Sales Performance Dashboard</h1>
    <p>Interactive Power BI dashboard for the sales analysis project.</p>
  </header>

  <main>
    <!-- iframe de Power BI -->
    <iframe title="Dashboard_BI_SALES_ANALYSIS" width="600" height="373.5" 
      src="https://app.powerbi.com/view?r=eyJrIjoiODViOTA0ZGUtYzY4My00YmViLWIxNTktMzY5YTdlODM1YTk0IiwidCI6IjY4NTE5ZTQ4LTgzZjMtNDM1Zi1hMzhhLTFhN2FhNzdiYTk4NyIsImMiOjh9" 
      frameborder="0" allowFullScreen="true">
    </iframe>
  </main>
</body>
</html>
